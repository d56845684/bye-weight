# ============================================================
# 開發環境
# ============================================================
#
# 對外 port 原則：**只有 nginx 對外**。其他服務（含 postgres / redis）
# 不綁 host port，只在 Docker internal network 互通，host 看不到。
#
# 啟動：
#   docker compose -f docker-compose.dev.yml --profile full up -d
#   對外只剩：http://localhost:8080  （nginx 做所有路由分派）
#
# 想用 host psql / redis-cli 連 DB：
#   docker compose -f docker-compose.dev.yml exec postgres psql -U postgres
#   docker compose -f docker-compose.dev.yml exec redis redis-cli
#
# Port mapping：
#   nginx          0.0.0.0:8080 → 80     （唯一對外）
#   其他全部       container-only       （Docker network 內互通）
# ============================================================

services:

  # ── 基礎設施（兩種用法都起）────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: dev
    volumes:
      - bw_pg_data:/var/lib/postgresql/data
      - ./sql/init-dev.sql:/docker-entrypoint-initdb.d/init-dev.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  # ── 應用服務（--profile full 才起；不 expose 任何 port）──
  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    expose:
      - "8001"
    env_file: ./auth_service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: ["full"]

  main_service:
    build:
      context: ./main_service
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file: ./main_service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: ["full"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file: ./frontend/.env.docker
    depends_on:
      - main_service
    profiles: ["full"]

  # ── 唯一對外入口 ──────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth_service
      - main_service
      - frontend
    profiles: ["full"]

volumes:
  bw_pg_data:
