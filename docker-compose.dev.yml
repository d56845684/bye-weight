# ============================================================
# 開發環境 — 兩種用法
# ============================================================
#
# 對外 port 原則：**只有 nginx 對外**（公網 / LAN 可達）。其他服務只在
# Docker internal network 互通，host 看不到。為保留 mode A 的 DX，postgres
# 跟 redis 仍綁 port 但限制在 127.0.0.1 loopback（host 本機 psql/redis-cli
# 可以連、外網打不到）。
#
# 用法 A：只起 DB（服務在本機跑，有 hot-reload）
#   docker compose -f docker-compose.dev.yml up -d
#   psql 連：  PGPASSWORD=dev psql -h 127.0.0.1 -p 5433 -U postgres
#   起服務：  cd auth_service && source .env && go run .
#            cd main_service && source .env && uvicorn main:app --reload --port 8002
#            cd frontend && pnpm dev -p 3001
#
# 用法 B：全部放 Docker（不想裝 Go/Python/Node）
#   docker compose -f docker-compose.dev.yml --profile full up -d
#   對外只剩：http://localhost:8080  （nginx 做所有路由分派）
#
# Port mapping：
#   postgres       127.0.0.1:5433 → 5432    （dev loopback；容器內部仍用 5432）
#   redis          127.0.0.1:6380 → 6379    （同上）
#   nginx          0.0.0.0:8080 → 80         （唯一對外）
#   auth / main / frontend:
#     不 expose，只在 Docker network 內 nginx 能打到
# ============================================================

services:

  # ── 基礎設施（兩種用法都起）────────────────────
  postgres:
    image: postgres:15-alpine
    # loopback 綁定：host 端 127.0.0.1 可連（mode A dev），外網 / LAN 不可達
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_PASSWORD: dev
    volumes:
      - bw_pg_data:/var/lib/postgresql/data
      - ./sql/init-dev.sql:/docker-entrypoint-initdb.d/init-dev.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"

  # ── 應用服務（--profile full 才起；不 expose 任何 port）──
  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    expose:
      - "8001"
    env_file: ./auth_service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: ["full"]

  main_service:
    build:
      context: ./main_service
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file: ./main_service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: ["full"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file: ./frontend/.env.docker
    depends_on:
      - main_service
    profiles: ["full"]

  # ── 唯一對外入口 ──────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth_service
      - main_service
      - frontend
    profiles: ["full"]

volumes:
  bw_pg_data:
