services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth_service
      - main_service
      - frontend
    restart: always

  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    expose:
      - "8001"
    env_file: ./auth_service/.env
    depends_on:
      - redis
      - cloudsql_proxy
    restart: always

  main_service:
    build:
      context: ./main_service
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file: ./main_service/.env
    depends_on:
      - redis
      - cloudsql_proxy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file: ./frontend/.env
    restart: always

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: always

  cloudsql_proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "${GCP_PROJECT_ID}:asia-east1:${CLOUD_SQL_INSTANCE}"
    volumes:
      - ./credentials/service-account.json:/secrets/sa.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/sa.json
    expose:
      - "5432"
    restart: always

volumes:
  redis_data:
