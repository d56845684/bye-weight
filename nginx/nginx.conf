server {
    listen 80;
    server_name _;

    # nginx 預設會用 $host（無 port）組 Location，造成 dev 從 8080 導去 80。
    # 關掉讓它直接回 relative path（/admin/login），由瀏覽器解析。
    absolute_redirect off;

    # ── 內部 sub_request 驗證端點（不對外；Nginx 自己打）──
    location = /auth/verify {
        internal;
        proxy_pass              http://auth_service:8001/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Cookie $http_cookie;
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        X-Original-Method $request_method;
    }

    # ── 前端頁面層身份驗證（輕量；只檢登入，不跑 action mapping）──
    location = /auth/verify-page {
        internal;
        proxy_pass              http://auth_service:8001/auth/verify-page;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Cookie $http_cookie;
    }

    # ── Auth 管理 API v1（super_admin 和各 tenant 的 clinic-admin 共用）──
    location /auth/v1/admin/ {
        auth_request        /auth/verify;
        auth_request_set    $user_id    $upstream_http_x_user_id;
        auth_request_set    $user_role  $upstream_http_x_user_role;
        auth_request_set    $tenant_id  $upstream_http_x_tenant_id;
        proxy_set_header    X-User-Id   $user_id;
        proxy_set_header    X-User-Role $user_role;
        proxy_set_header    X-Tenant-Id $tenant_id;

        # 剝掉 /v1/：後端 auth_service 不認 /v1，只認 /auth/admin/*
        rewrite ^/auth/v1/(.*) /auth/$1 break;
        proxy_pass          http://auth_service:8001;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Auth 對外端點 v1（登入 / 登出 / me）──
    location /auth/v1/ {
        rewrite ^/auth/v1/(.*) /auth/$1 break;
        proxy_pass         http://auth_service:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── huma 產的 OpenAPI / Docs UI / Schemas（UI 內嵌絕對路徑，不走 v1 rewrite）──
    # GET /auth/docs           互動式 UI（Stoplight Elements）
    # GET /auth/openapi.yaml   spec（yaml / json 都有）
    # GET /auth/schemas/*      個別 schema 定義
    location ~ ^/auth/(docs|openapi|schemas) {
        proxy_pass         http://auth_service:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── LINE Webhook v1（不需要 JWT，用 LINE signature 驗證）──
    location /api/v1/line/webhook {
        rewrite ^/api/v1/(.*) /$1 break;
        proxy_pass          http://main_service:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── 內部端點 v1（Cloud Scheduler，用 OIDC token 驗證）──
    location /api/v1/internal/ {
        rewrite ^/api/v1/(.*) /$1 break;
        proxy_pass          http://main_service:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Kuji OAuth callback（public；不擋 auth_request）──
    # provider 回傳時瀏覽器可能沒帶 kuji cookie（跨站 redirect），防 CSRF 靠 state。
    location ~ ^/kuji/api/v1/integrations/[^/]+/callback$ {
        rewrite             ^/kuji/api/v1/(.*) /$1 break;
        proxy_pass          http://kuji_backend:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Kuji Backend API v1（每個 request 先 auth_request）──
    # 注意：auth_request 會用完整 URI（/kuji/api/v1/*）比對 action_mappings；
    # 通過後 rewrite 剝掉 /kuji/api/v1/ 只留 /meetings, /tasks 給 kuji_backend。
    location /kuji/api/v1/ {
        auth_request        /auth/verify;

        auth_request_set    $user_id    $upstream_http_x_user_id;
        auth_request_set    $user_role  $upstream_http_x_user_role;
        auth_request_set    $tenant_id  $upstream_http_x_tenant_id;

        proxy_set_header    X-User-Id   $user_id;
        proxy_set_header    X-User-Role $user_role;
        proxy_set_header    X-Tenant-Id $tenant_id;

        rewrite             ^/kuji/api/v1/(.*) /$1 break;
        proxy_pass          http://kuji_backend:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Kuji Next.js 靜態資源 / favicon（不擋；login 頁也會打這些）──
    location /kuji/_next/ {
        proxy_pass         http://kuji_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location = /kuji/favicon.ico {
        proxy_pass         http://kuji_frontend:3000;
        proxy_set_header   Host $host;
    }

    # Demo 音檔 / 其他公開靜態資產（public/sample/*）不擋 auth_request
    location /kuji/sample/ {
        proxy_pass         http://kuji_frontend:3000;
        proxy_set_header   Host $host;
    }

    # ── Kuji 前端公開頁（登入 / 註冊；user 此時尚未登入）──
    location ~ ^/kuji/(login|signup)$ {
        proxy_pass         http://kuji_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Kuji 前端（登入後；頁面層驗證，401 回 /kuji/login）──
    location /kuji/ {
        auth_request        /auth/verify-page;
        error_page 401 = @kuji_login_redirect;

        proxy_pass          http://kuji_frontend:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    location @kuji_login_redirect { return 302 /kuji/login; }

    # ── 主服務 API v1（每個 request 先 auth_request）──
    location /api/v1/ {
        auth_request        /auth/verify;

        # IAM 模型只傳 generic identity 給下游；領域欄位由各服務自行解析
        auth_request_set    $user_id    $upstream_http_x_user_id;
        auth_request_set    $user_role  $upstream_http_x_user_role;
        auth_request_set    $tenant_id  $upstream_http_x_tenant_id;

        proxy_set_header    X-User-Id   $user_id;
        proxy_set_header    X-User-Role $user_role;
        proxy_set_header    X-Tenant-Id $tenant_id;

        # 剝掉 /api/v1/：後端 main_service 看到的仍是 /patients 等舊路徑
        rewrite             ^/api/v1/(.*) /$1 break;
        proxy_pass          http://main_service:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── /admin 本身導到 /admin/tenants（讓 guard 接手處理 401）──
    location = /admin {
        return 302 /admin/tenants;
    }

    # ── 後台登入頁（不擋，所有人都要能進）──
    location /admin/login {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Google 綁定邀請 landing 頁（一次性 token 驗證；user 此時尚未登入）──
    location /admin/bind-google {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── 前端後台（super_admin 專用，nginx 層擋）──
    location /admin/ {
        auth_request        /auth/verify;
        auth_request_set    $user_role  $upstream_http_x_user_role;

        # 未登入 → 導到登入頁；權限不足 → 顯示 403 訊息
        error_page 401 = @admin_login_redirect;
        error_page 403 = @admin_forbidden;

        proxy_set_header    X-User-Role $user_role;
        proxy_pass          http://frontend:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    location @admin_login_redirect {
        return 302 /admin/login;
    }

    location @admin_forbidden {
        default_type text/html;
        return 403 '<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><title>403</title><style>body{font-family:sans-serif;max-width:480px;margin:80px auto;padding:24px;color:#333}h1{color:#b91c1c}a{color:#b91c1c}</style></head><body><h1>403 權限不足</h1><p>後台需要 <code>super_admin</code> 角色才能存取。</p><p><a href="/admin/login">以其他帳號登入</a></p></body></html>';
    }

    # ── 前端業務頁面（patient / staff / nutritionist）──
    # 只確認已登入；細粒度角色授權留給 API layer 的 /auth/verify。
    # 未登入 → 導去 /liff 重新觸發 LIFF 登入。
    location ~ ^/(patient|staff|nutritionist)/ {
        auth_request        /auth/verify-page;
        error_page 401 = @liff_redirect;

        proxy_pass          http://frontend:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    location @liff_redirect { return 302 /liff; }

    # ── 前端 Next.js（所有其他路徑）──
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
