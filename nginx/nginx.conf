server {
    listen 80;
    server_name _;

    # ── 內部 sub_request 驗證端點（不對外）──
    location = /auth/verify {
        internal;
        proxy_pass              http://auth_service:8001/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Cookie $http_cookie;
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        X-Original-Method $request_method;
    }

    # ── Auth 對外端點（登入 / 登出，不需要 auth_request）──
    location /auth/ {
        proxy_pass         http://auth_service:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── LINE Webhook（不需要 JWT 驗證，用 LINE signature 驗證）──
    location /api/line/webhook {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass          http://main_service:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── 內部端點（Cloud Scheduler，用 OIDC token 驗證）──
    location /api/internal/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass          http://main_service:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── 主服務 API（每個 request 先驗證）──
    location /api/ {
        auth_request        /auth/verify;

        auth_request_set    $user_id    $upstream_http_x_user_id;
        auth_request_set    $user_role  $upstream_http_x_user_role;
        auth_request_set    $patient_id $upstream_http_x_patient_id;
        auth_request_set    $clinic_id  $upstream_http_x_clinic_id;

        proxy_set_header    X-User-Id    $user_id;
        proxy_set_header    X-User-Role  $user_role;
        proxy_set_header    X-Patient-Id $patient_id;
        proxy_set_header    X-Clinic-Id  $clinic_id;

        rewrite             ^/api/(.*) /$1 break;
        proxy_pass          http://main_service:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── 前端 Next.js ──
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
